{{/* Login page template - matches SPEC-design-good-looking-uis-login-mockup */}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HomeStack — Sign in</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
    HomeStack
  </div>
  <div class="card">
    <h1>Sign in to your account</h1>
    {{if .Error}}
    <div class="error" role="alert">{{.Error}}</div>
    {{end}}
    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </div>
  <p class="footer">Local cloud — no data leaves your network.</p>
</body>
</html>
